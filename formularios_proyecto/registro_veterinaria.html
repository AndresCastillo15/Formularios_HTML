<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animalia - Registro de Veterinaria</title>
</head>
<body>
    <h2>Registrar Veterinaria</h2>
    <fieldset>
        <legend>Registrar Veterinaria</legend>
        <form action="#" method="POST">
            <label for="nombre">Nombre de la Veterinaria:</label><br>
            <input type="text" id="nombre" name="nombre" required>
            <br><br>
            <label for="direccion">Dirección:</label><br>
            <input type="text" id="direccion" name="direccion" required>
            <br><br>
            <label for="telefono">Teléfono:</label><br>
            <input type="tel" id="telefono" name="telefono" required>
            <br><br>
            <label for="correo">Correo Electrónico:</label><br>
            <input type="email" id="correo" name="correo" required>
            <br><br>
        </form>
    </fieldset>
    <br>
                <button type="submit">Guardar Veterinaria</button>
            <button type="reset">Limpiar</button>
</body>
</html>
