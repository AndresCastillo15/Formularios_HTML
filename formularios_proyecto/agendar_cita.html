<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Animalia - Agendar Cita</title>
</head>
<body>
    <h2>Agendar Cita Médica</h2>
    <form action="#" method="POST">
        <label for="id_mascota">ID o Nombre de la Mascota:</label>
        <input type="text" id="id_mascota" name="id_mascota" required>
        <br><br>
        <label for="fecha">Fecha de la Cita:</label>
        <input type="date" id="fecha" name="fecha" required>
        <br><br>
        <label for="hora">Hora:</label>
        <input type="time" id="hora" name="hora" required>
        <br><br>
        <label for="motivo">Motivo de la Consulta:</label>
        <br>
        <textarea id="motivo" name="motivo" rows="4" cols="30" required></textarea>
        <br><br>
        <button type="submit">Agendar Cita</button>
        <button type="reset">Limpiar</button>
    </form>
</body>
</html>
